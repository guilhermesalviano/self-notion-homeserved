name: Release Protocol
on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Ship Logs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog and Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          VERSION_PARTS=(${LAST_TAG//./ })
          V_MAJOR=${VERSION_PARTS[0]}
          V_MINOR=${VERSION_PARTS[1]}
          V_PATCH=$((VERSION_PARTS[2] + 1))
          NEW_TAG="$V_MAJOR.$V_MINOR.$V_PATCH"

          LOGS=$(git log $LAST_TAG..HEAD --oneline --pretty=format:"* %s")

          echo -e "## $NEW_TAG ($(date +%Y-%m-%d))\n\n$LOGS\n\n$(cat CHANGELOG.md 2>/dev/null)" > CHANGELOG.md
          
          git config user.name "guilhermesalviano"
          git config user.email "[EMAIL_ADDRESS]"
          git add CHANGELOG.md
          git commit -m "chore(release): $NEW_TAG [skip ci]"
          git tag $NEW_TAG
          git push origin main --tags
          
          gh release create $NEW_TAG --title "$NEW_TAG" --notes "$LOGS"